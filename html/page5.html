<!DOCTYPE html>
<html lang = "vi">
        <head>
               <title>Bảng cửu chương</title>
               <meta charset = "utf -8">
			   <link rel = "stylesheet" href = "../css/style5.css">
         </head>
         <body>
            <form id="formBangCC">
                <h3>in bảng cửu chương</h3>
                <label>Nhập số:</label>
                <input type="number" id="so" required>
                <button type="button" onclick="hienthi()">In</button>
                <div id="ketqua"></div>
            </form>
            <script>
                function hienthi() {
                    let n = document.getElementById("so").value;
                    let kq ="";
                    for (let i = 1; i <=10; i++) {
                        kq += n + "X" + i + " = " + (n * i) + "<br>";
                    }
                    document.getElementById("ketqua").innerHTML = kq;
                }
            </script>
            </body>
            </html>
