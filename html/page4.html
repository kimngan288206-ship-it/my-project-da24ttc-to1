<!DOCTYPE html>
<html lang = "vi">
        <head>
               <title>Hóa đơn thanh toán</title>
               <meta charset = "utf -8">
			   <link rel = "stylesheet" href = "../css/style4.css">
         </head>
         <body>
            <h3 style = "text-align:center;">Hóa đơn thanh toán</h3>
            <table border="1">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Tên sản phấm</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Thành tiền</th>
                    </tr>
                </thead>
                <body>
                    <tr>
                        <td>1</td>
                        <td>A</td>
                        <td class="sl">3</td>
                        <td class="dg">1000</td>
                        <td class="tt"></td>
                        </tr>
                    </tr>
                    <td>2</td>
                    <td>B</td>
                    <td class="sl">2</td>
                    <td class="dg">2000</td>
                    <td class="tt"></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>C</td>
                    <td class="sl">4</td>
                    <td class="dg">3000</td>
                    <td class="tt"></td>
                    </tr>
                <tr class ="total">
                <td colspan="4">Tổng thanh toán</td>
                <td id="tongthanhtoan"></td>
            </tr>
                </body>
            </table>
            <script>
                const dongia = document.querySelectorAll(".dg");
                const soluong = document.querySelectorAll(".sl");
                const thanhtien = document.querySelectorAll(".tt");
                let tongthanhtoan = 0;
                for (let i = 0; i<dongia.length; i++) 
            {
                thanhtien[i].innerHTML=soluong[i].innerHTML*dongia[i].innerHTML;
                tongthanhtoan += parseInt(thanhtien[i].innerHTML);
            }
            document.getElementById("tongthanhtoan").innerHTML = tongthanhtoan;
            </script>
            </body>
</html>
